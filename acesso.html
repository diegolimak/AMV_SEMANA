<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reunião Semanal — Amor à Vida</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --navy:    #1E3A5F;
  --navy-d:  #152B47;
  --navy-dd: #0c1a2e;
  --blue:    #1B7DC4;
  --light:   #7EC8E3;
  --white:   #ffffff;
}

html, body {
  min-height: 100dvh;
  font-family: 'Inter', sans-serif;
  background: var(--navy-dd);
  color: var(--white);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px 20px;
  overflow: hidden;
}

/* ── Fundo animado ── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 60% at 20% 10%, rgba(30,58,95,.9) 0%, transparent 70%),
    radial-gradient(ellipse 60% 50% at 80% 90%, rgba(27,125,196,.25) 0%, transparent 60%),
    radial-gradient(ellipse 40% 40% at 60% 30%, rgba(126,200,227,.08) 0%, transparent 50%);
  z-index: 0;
  animation: bgShift 12s ease-in-out infinite alternate;
}
@keyframes bgShift {
  from { opacity: 1; }
  to   { opacity: .85; }
}

/* ── Grade de pontos ── */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image: radial-gradient(rgba(126,200,227,.12) 1px, transparent 1px);
  background-size: 28px 28px;
  z-index: 0;
}

/* ── Card central ── */
.card {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 440px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
  animation: fadeUp .7s cubic-bezier(.22,1,.36,1) both;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(28px); }
  to   { opacity: 1; transform: none; }
}

/* ── Logo ── */
.logo-wrap {
  margin-bottom: 32px;
}
.logo-wrap img {
  height: 52px;
  width: auto;
  filter: drop-shadow(0 2px 12px rgba(126,200,227,.3));
}

/* ── Badge semana ── */
.badge {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  background: rgba(126,200,227,.1);
  border: 1px solid rgba(126,200,227,.2);
  border-radius: 100px;
  padding: 5px 14px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--light);
  margin-bottom: 20px;
}
.badge-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--light);
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50%       { opacity: .4; transform: scale(.7); }
}

/* ── Título ── */
.title {
  font-family: 'Montserrat', sans-serif;
  font-size: clamp(26px, 7vw, 36px);
  font-weight: 900;
  line-height: 1.15;
  text-align: center;
  margin-bottom: 10px;
  letter-spacing: -.02em;
}
.title em {
  font-style: normal;
  color: var(--light);
}

/* ── Subtítulo ── */
.subtitle {
  font-size: 14px;
  font-weight: 400;
  color: rgba(255,255,255,.45);
  text-align: center;
  line-height: 1.5;
  margin-bottom: 36px;
}

/* ── Divisor ── */
.divider {
  width: 100%;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(126,200,227,.2), transparent);
  margin-bottom: 36px;
}

/* ── Botão principal ── */
.btn-main {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  width: 100%;
  padding: 18px 28px;
  background: linear-gradient(135deg, var(--blue) 0%, #1565a8 100%);
  border: none;
  border-radius: 16px;
  color: #fff;
  font-family: 'Montserrat', sans-serif;
  font-size: 16px;
  font-weight: 700;
  letter-spacing: .01em;
  text-decoration: none;
  cursor: pointer;
  transition: transform .18s, box-shadow .18s, filter .18s;
  box-shadow: 0 8px 32px rgba(27,125,196,.4), inset 0 1px 0 rgba(255,255,255,.15);
  position: relative;
  overflow: hidden;
  margin-bottom: 14px;
}
.btn-main::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,.12) 0%, transparent 60%);
  pointer-events: none;
}
.btn-main:hover  { transform: translateY(-2px); box-shadow: 0 14px 40px rgba(27,125,196,.5); filter: brightness(1.08); }
.btn-main:active { transform: translateY(0);    box-shadow: 0 4px 16px rgba(27,125,196,.35); }
.btn-main svg { flex-shrink: 0; }

/* ── Botão secundário ── */
.btn-sec {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  width: 100%;
  padding: 14px 24px;
  background: rgba(255,255,255,.05);
  border: 1px solid rgba(255,255,255,.1);
  border-radius: 14px;
  color: rgba(255,255,255,.6);
  font-family: 'Inter', sans-serif;
  font-size: 13px;
  font-weight: 500;
  text-decoration: none;
  cursor: pointer;
  transition: background .18s, color .18s, border-color .18s;
  margin-bottom: 40px;
}
.btn-sec:hover { background: rgba(255,255,255,.09); color: rgba(255,255,255,.9); border-color: rgba(255,255,255,.18); }

/* ── Rodapé ── */
.footer {
  font-size: 11px;
  color: rgba(255,255,255,.2);
  text-align: center;
  letter-spacing: .04em;
  line-height: 1.6;
}
.footer strong { color: rgba(255,255,255,.35); font-weight: 600; }

/* ── Partículas decorativas ── */
.particle {
  position: fixed;
  border-radius: 50%;
  pointer-events: none;
  z-index: 0;
  animation: floatUp linear infinite;
  opacity: 0;
}
@keyframes floatUp {
  0%   { transform: translateY(100vh) scale(0); opacity: 0; }
  10%  { opacity: .5; }
  90%  { opacity: .15; }
  100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
}
</style>
</head>
<body>

<!-- Partículas -->
<script>
  for (let i = 0; i < 9; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const s = Math.random() * 4 + 2;
    p.style.cssText = `width:${s}px;height:${s}px;left:${Math.random()*100}%;background:rgba(126,200,227,${Math.random()*.3+.1});animation-duration:${Math.random()*14+10}s;animation-delay:${Math.random()*10}s`;
    document.body.appendChild(p);
  }
</script>

<div class="card">

  <!-- Logo -->
  <div class="logo-wrap">
    <img src="assets/logo-horizontal-branca.png" alt="Amor à Vida">
  </div>

  <!-- Badge -->
  <div class="badge">
    <span class="badge-dot"></span>
    Reunião Semanal
  </div>

  <!-- Título -->
  <h1 class="title">Resultados da<br><em>Semana</em> 💙</h1>

  <!-- Subtítulo -->
  <p class="subtitle">
    Acompanhe os números, metas e destaques<br>
    da equipe Amor à Vida desta semana.
  </p>

  <div class="divider"></div>

  <!-- CTA principal -->
  <a href="index.html" class="btn-main">
    <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M9 17.25v1.007a3 3 0 01-.879 2.122L7.5 21h9l-.621-.621A3 3 0 0115 18.257V17.25m6-12V15a2.25 2.25 0 01-2.25 2.25H5.25A2.25 2.25 0 013 15V5.25m18 0A2.25 2.25 0 0018.75 3H5.25A2.25 2.25 0 003 5.25m18 0H3"/>
    </svg>
    Abrir Apresentação
  </a>

  <!-- Botão admin -->
  <a href="admin.html" class="btn-sec">
    <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M10.343 3.94c.09-.542.56-.94 1.11-.94h1.093c.55 0 1.02.398 1.11.94l.149.894c.07.424.384.764.78.93.398.164.855.142 1.205-.108l.737-.527a1.125 1.125 0 011.45.12l.773.774c.39.389.44 1.002.12 1.45l-.527.737c-.25.35-.272.806-.107 1.204.165.397.505.71.93.78l.893.15c.543.09.94.559.94 1.109v1.094c0 .55-.397 1.02-.94 1.11l-.894.149c-.424.07-.764.383-.929.78-.165.398-.143.854.107 1.204l.527.738c.32.447.269 1.06-.12 1.45l-.774.773a1.125 1.125 0 01-1.449.12l-.738-.527c-.35-.25-.806-.272-1.203-.107-.398.165-.71.505-.781.929l-.149.894c-.09.542-.56.94-1.11.94h-1.094c-.55 0-1.019-.398-1.11-.94l-.148-.894c-.071-.424-.384-.764-.781-.93-.398-.164-.854-.142-1.204.108l-.738.527c-.447.32-1.06.269-1.45-.12l-.773-.774a1.125 1.125 0 01-.12-1.45l.527-.737c.25-.35.272-.806.108-1.204-.165-.397-.506-.71-.93-.78l-.894-.15c-.542-.09-.94-.56-.94-1.109v-1.094c0-.55.398-1.02.94-1.11l.894-.149c.424-.07.764-.383.93-.78.165-.398.143-.854-.108-1.204l-.526-.738a1.125 1.125 0 01.12-1.45l.773-.773a1.125 1.125 0 011.45-.12l.737.527c.35.25.807.272 1.204.107.397-.165.71-.505.78-.929l.15-.894z"/>
      <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
    </svg>
    Painel Administrativo (Gestoras)
  </a>

  <!-- Rodapé -->
  <p class="footer">
    <strong>Corretora Amor à Vida</strong><br>
    Uso interno — Equipe comercial
  </p>

</div>
</body>
</html>
