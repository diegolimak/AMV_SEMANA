<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200' viewBox='0 0 200 200'>
  <defs>
    <linearGradient id='bg' x1='0' y1='0' x2='1' y2='1'>
      <stop offset='0%' stop-color='#0d1f38'/>
      <stop offset='55%' stop-color='#1B7DC4'/>
      <stop offset='100%' stop-color='#5ab4d8'/>
    </linearGradient>
    <clipPath id='circ'>
      <circle cx='100' cy='100' r='100'/>
    </clipPath>
    <radialGradient id='shine' cx='35%' cy='30%' r='60%'>
      <stop offset='0%' stop-color='rgba(255,255,255,0.12)'/>
      <stop offset='100%' stop-color='rgba(255,255,255,0)'/>
    </radialGradient>
  </defs>
  <!-- Fundo azul -->
  <circle cx='100' cy='100' r='100' fill='url(#bg)'/>
  <!-- Brilho sutil -->
  <circle cx='100' cy='100' r='100' fill='url(#shine)'/>
  <!-- Ombros / corpo (clipado) -->
  <ellipse cx='100' cy='186' rx='68' ry='52' fill='rgba(255,255,255,0.16)' clip-path='url(#circ)'/>
  <!-- Pescoço -->
  <rect x='88' y='116' width='24' height='26' rx='10' fill='rgba(255,255,255,0.16)' clip-path='url(#circ)'/>
  <!-- Cabeça -->
  <circle cx='100' cy='90' r='44' fill='rgba(255,255,255,0.20)'/>
  <!-- Borda suave da cabeça -->
  <circle cx='100' cy='90' r='44' fill='none' stroke='rgba(255,255,255,0.30)' stroke-width='2'/>
  <!-- Iniciais -->
  <text x='100' y='91'
        font-family='Montserrat,Arial,sans-serif'
        font-size='36' font-weight='900'
        fill='white'
        text-anchor='middle'
        dominant-baseline='central'
        letter-spacing='1'>S</text>
</svg>
